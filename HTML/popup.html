<!DOCTYPE html>
<html>

<head>
    <script type="module" src="/scripts/popup.js" defer></script>
    <link rel="stylesheet" href="/CSS/popup.css">
</head>

<body>

<div class="wrapper">

    <div class="topBar">
        <div class="title unselectable">TimeWizard</div>

        <button type="button" class="themeToggle unselectable" id="themeToggle" aria-label="Switch to light mode" title="Toggle light mode">
            <span class="themeIcon themeIconSun" aria-hidden="true">
                <img src="/images/night.svg" class="themeToggleSvg themeToggleSvgNight" alt="">
            </span>
            <span class="themeIcon themeIconMoon" aria-hidden="true">
                <img src="/images/light.svg" class="themeToggleSvg themeToggleSvgLight" alt="">
            </span>
        </button>
    </div>

    <div class="toggleRow">
        <div class="toggleTextWrap">
            <span class="toggleLabel">Auto Detect Time Zone</span>
            <span class="toggleSubtext" id="toggleStatusText">OFF</span>
        </div>

        <label class="coolToggle">
            <input type="checkbox" id="extensionToggle">
            <span class="coolSlider"></span>
        </label>
    </div>
    <div class="toggleError hidden" id="toggleErrorText"></div>

    <!-- NAV BAR -->
    <div class="nav">

        <div class="navSlider"></div>

        <button class="unselectable navBtn active" data-tab="convert">
            Manual Convert
        </button>
        
        <button class="unselectable navBtn" data-tab="detect">
            Paste & Convert
        </button>

    </div>

    <div class="tabsWrapper">
        <div class="tabsTrack">

            <!-- CONVERT TIME SECTION -->
            <div class="tabContent" id="convert">

                <div class="section" >
                    <label for="timeInput" class="labelWithInfo">
                        Input Time
                        <span class="infoIconWrapper unselectable" data-tooltip="Automatically turns into military time if AM/PM field is not specified">
                            <img src="/images/infoicon.svg" class="infoIcon" alt="info">
                        </span>
                    </label>

                    <div class="standardTimeInput">
                        <div class="timezoneInputWrap">
                            <input type="text" id="convertTimeInput" placeholder="11pm, 10:30A.M., or 1300" autocomplete="off">
                            <button type="button" class="clearTimezoneBtn unselectable" id="clearTimeZone" aria-label="Clear from timezone">
                                <img src="/images/trashicon.svg" class="trashIcon" alt="clear">
                            </button>
                        </div>
                    </div>
                </div>

                <div class="section">
                    <label for="sourceZoneSearch" class="labelWithInfo">
                        From Timezone:
                        <span class="infoIconWrapper unselectable" data-tooltip="Select the timezone you are converting FROM">
                            <img src="/images/infoicon.svg" class="infoIcon" alt="info">
                        </span>
                    </label>
                    <div class="timezonePicker">
                        <div class="timezoneInputWrap">
                            <input type="text" id="sourceZoneSearch" placeholder="Timezone: City/Country" autocomplete="off">
                            <button type="button" class="clearTimezoneBtn unselectable" id="clearSourceZone" aria-label="Clear from timezone">
                                <img src="/images/trashicon.svg" class="trashIcon" alt="clear">
                            </button>
                        </div>
                        <input type="hidden" id="sourceZone">
                        <div class="timezoneList" id="sourceZoneList"></div>
                    </div>
                </div>

                <div class="section">
                    <label for="targetZoneSearch" class="labelWithInfo">
                        To Timezone:
                        <span class="infoIconWrapper unselectable" data-tooltip="Select the timezone you are converting TO">
                            <img src="/images/infoicon.svg" class="infoIcon" alt="info">
                        </span>
                    </label>
                    <div class="timezonePicker">
                        <div class="timezoneInputWrap">
                            <input type="text" id="targetZoneSearch" placeholder="Timezone: City/Country" autocomplete="off">
                            <button type="button" class="clearTimezoneBtn unselectable" id="clearTargetZone" aria-label="Clear to timezone">
                                <img src="/images/trashicon.svg" class="trashIcon" alt="clear">
                            </button>
                        </div>
                        <input type="hidden" id="targetZone">
                        <div class="timezoneList" id="targetZoneList"></div>
                    </div>
                </div>

                <div class="section">
                    <button class="unselectable convertBtn" id="convertTimeZone">Convert</button>
                </div>

                <div class="section">
                    <div class="convertOutput" id="convertTimeZoneOutput"></div>
                </div>

            </div>

            <!-- DETECT TIMEZONE -->
            <div class="tabContent" id="detect">

                <div class="section">
                    <button class="unselectable" id="getLocation">Get My Timezone</button>
                </div>

                <div class="section">
                    <div id="timezone"></div>
                </div>

                <div class="section copyPasteSection">
                    <div class="copyPasteLabelRow">
                        <label for="copyPasteInput">Copy-Paste Time</label>
                        <span class="infoIconWrapper unselectable" id="openManual" aria-label="Formatting help" data-tooltip="Click here for instructions">
                            <img src="/images/infoicon.svg" class="infoIcon" alt="info">
                        </span>
                    </div>

                    <div class="textareaWrap">
                        <textarea id="copyPasteInput"
                                placeholder="Format as: 12:30 PM UTC, 09:00 CET, or 23:45 UTC+8"
                                spellcheck="false"
                                autocorrect="off"></textarea>
                        <button type="button" class="clearTextareaBtn unselectable" id="clearCopyPasteInput" aria-label="Clear pasted time">
                            <img src="/images/trashicon.svg" class="trashIcon" alt="">
                        </button>
                    </div>
                </div>
                <div class="section">
                    <button class="unselectable" class="convertBtn" id="convertCopyPaste">Convert</button>
                </div>

                <div class="section">
                    <div class="convertOutput" id="convertCopyPasteOutput"></div>
                </div>

            </div>
        </div>
    </div>

</div>

</body>
</html>
