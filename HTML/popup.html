<!DOCTYPE html>
<html>

<head>
    <script src="/scripts/popup.js" defer></script>
    <link rel="stylesheet" href="/CSS/popup.css">
</head>

<body>

<div class="wrapper">

    <div class="title">Convert Any Time</div>

    <!-- NAV BAR -->
    <div class="nav">

        <div class="navSlider"></div>

        <button class="navBtn active" data-tab="convert">
            Convert Time
        </button>
        
        <button class="navBtn" data-tab="detect">
            My Timezone
        </button>

    </div>

    <div class="tabsWrapper">
        <div class="tabsTrack">

            <!-- CONVERT TIME SECTION -->
            <div class="tabContent" id="convert">

                <div class="section">
                    <label for="timeInput">Paste Time</label>
                    <textarea id="timeInput" placeholder="e.g. 12pm UTC, 18:30 GMT, March 5 3pm PST"></textarea>
                </div>

                <div class="section">
                    <label>Convert To</label>
                    <input id="targetZone" placeholder="e.g. Asia/Tokyo, America/New_York">
                </div>

                <div class="section">
                    <button id="convertBtn">Convert</button>
                </div>

                <div class="section">
                    <div id="convertOutput"></div>
                </div>

            </div>

            <!-- DETECT TIMEZONE -->
            <div class="tabContent" id="detect">

                <div class="section">
                    <button id="getLocation">Get My Timezone</button>
                </div>

                <div class="section">
                    <div id="timezone"></div>
                </div>

                <div class="section">
                    <label>Copy-Paste Time</label>
                    <textarea id="copyPasteOutput"></textarea>
                </div>

            </div>
        </div>
    </div>

</div>

</body>
</html>
